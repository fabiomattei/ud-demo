services:

  phpinfo:
    build: ./
    container_name: uddemo-php
    ports:
      - "18080:80"
    networks:
      - firststepnet
    volumes:
      - .:/var/www/html
    links:
      - mysqldb
    environment:
      DB_HOST: mysql:host=mysqldb:3306;dbname=
      DB_NAME: firststep
      DB_USER: user
      DB_PASSWORD: userp
      BASE_PATH: http://localhost:18080/

  mysqldb:
    image: mysql:9.1.0
    container_name: uddemo-mysqldb
    volumes:
      - ./data/db:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - firststepnet
    restart: always
    environment:
      MYSQL_DATABASE: firststep
      MYSQL_USER: user
      MYSQL_PASSWORD: userp
      MYSQL_ROOT_PASSWORD: rootpassword

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: uddemo-phpmyadmin
    links:
      - mysqldb
    ports:
      - 8183:80
    networks:
      - firststepnet
    environment:
      PMA_HOST: mysqldb
      PMA_USER: user
      PMA_PASSWORD: userp
      PMA_ARBITRARY: 1

networks:
    firststepnet:
        driver: bridge
